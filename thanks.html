<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Message Received — Young City Foundation</title>
  <link rel="icon" href="assets/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand-blue: #0056b3;
      --brand-yellow: #ffcc00;
      --text-dark: #1a1a1a;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f9f9f9;
      color: var(--text-dark);
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      display: block;
    }
    h1 {
      font-weight: 800;
      font-size: 32px;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    p {
      line-height: 1.6;
      color: #555;
      margin-bottom: 30px;
    }
    .btn-home {
      display: inline-block;
      background-color: var(--brand-blue);
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease;
    }
    .btn-home:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 86, 179, 0.3);
    }
    .logo-small {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      margin-bottom: 20px;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="assets/logo.jpg" alt="Young City Logo" class="logo-small">
    <span class="icon">✨</span>
    <h1>Message Received!</h1>
    <p>Thank you for reaching out to <strong>Young City Foundation</strong>. We’ve received your message and will get back to you through your Gmail as soon as possible.</p>
    <a href="index.html" class="btn-home">Back to Home</a>
  </div>

</body>
</html>
